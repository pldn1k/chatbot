name: Deploy to Kubernetes

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: docker.io
  IMAGE_NAME: pldn1k/chatbot

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug secret
        run: |
          if [ -n "${{ secrets.DOCKER_TOKEN }}" ]; then
            echo "✅ DOCKER_TOKEN is set"
          else
            echo "❌ DOCKER_TOKEN is empty"
          fi
        env:
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: pldn1k
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Setup kubeconfig
        run: |
          mkdir -p /home/guest/.kube
          echo "${{ secrets.KUBECONFIG_BASE64 }}" | base64 -d > /home/guest/.kube/config
          chmod 600 /home/guest/.kube/config
          export KUBECONFIG=/home/guest/.kube/config
          kubectl cluster-info

      - name: Test kubectl
        run: |
          export KUBECONFIG=/home/guest/.kube/config
          kubectl cluster-info
          kubectl get nodes

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Deploy to Kubernetes
        run: |
          export KUBECONFIG=/home/guest/.kube/config
          helm upgrade --install chatbot ./helm/chatbot \
            --namespace chatbot \
            --create-namespace \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ github.sha }} \
            --set image.pullPolicy=IfNotPresent \
            --set postgresql.enabled=false \
            --set redis.enabled=false \
            --set rabbitmq.enabled=false \
            --wait

      - name: Verify deployment
        run: |
          export KUBECONFIG=/home/guest/.kube/config
          kubectl rollout status deployment/chatbot -n chatbot
          kubectl get pods -n chatbot
          
# Work now! 
