{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "chatbot.fullname" . }}
spec:
  podSelector:
    matchLabels:
      app: {{ include "chatbot.name" . }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgresql
        - podSelector:
            matchLabels:
              app: redis
        - podSelector:
            matchLabels:
              app: rabbitmq
        - podSelector:
            matchLabels:
              app: jaeger
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 53 #DNS
{{- end }}
