{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "chatbot.fullname" . }}-secrets
  labels:
    {{- include "chatbot.labels" . | nindent 4 }}
type: Opaque
data:
  # PostgreSQL
  postgres-password: {{ .Values.postgresql.auth.password | b64enc | quote }}
  postgres-username: {{ .Values.postgresql.auth.username | b64enc | quote }}
  
  # Redis
  redis-password: {{ .Values.redis.auth.password | b64enc | quote }}
  
  # RabbitMQ
  rabbitmq-password: {{ .Values.rabbitmq.auth.password | b64enc | quote }}
  rabbitmq-username: {{ .Values.rabbitmq.auth.username | b64enc | quote }}
  
  # JWT для авторизации (опционально)
  {{- if .Values.auth }}
  {{- if .Values.auth.jwtSecret }}
  jwt-secret: {{ .Values.auth.jwtSecret | b64enc | quote }}
  {{- end }}
  {{- end }}
  
  # API ключи для внешних сервисов
  {{- if .Values.externalServices }}
  {{- range $key, $value := .Values.externalServices }}
  {{ $key }}: {{ $value | b64enc | quote }}
  {{- end }}
  {{- end }}
  
  # Пароль для админки (опционально)
  {{- if .Values.auth }}
  {{- if .Values.auth.adminPassword }}
  admin-password: {{ .Values.auth.adminPassword | b64enc | quote }}
  {{- end }}
  {{- end }}
{{- end }}

---
# Secret для TLS если не используется cert manager
{{- if .Values.ingress }}
{{- if .Values.ingress.tlsSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "chatbot.fullname" . }}-tls
  labels:
    {{- include "chatbot.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  tls.crt: {{ .Values.ingress.tlsSecret.cert | b64enc }}
  tls.key: {{ .Values.ingress.tlsSecret.key | b64enc }}
{{- end }}
{{- end }}
