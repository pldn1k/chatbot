# Promtail Values
config:
  clients:
    - url: http://loki.monitoring.svc:3100/loki/api/v1/push
    
  snippets:
    scrapeConfigs:
      # Собираем логи с подов Kubernetes
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          # Оставляем только работающие поды
          - source_labels: [__meta_kubernetes_pod_phase]
            action: keep
            regex: Running
            
          # Добавляем метаданные из лейблов подов
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
            
          # Добавляем namespace, pod, container  
          - source_labels: [__meta_kubernetes_pod_namespace]
            action: replace
            target_label: namespace
            
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod
            
          - source_labels: [__meta_kubernetes_pod_container_name]
            action: replace
            target_label: container
            
          # Фильтруем только нужные контейнеры
          - source_labels: [__meta_kubernetes_pod_container_name]
            action: keep
            regex: chatbot|postgres|redis|rabbitmq|jaeger|grafana|loki|promtail|prometheus
            
      # Сбор логов с нод (kubelet)

      - job_name: kubernetes_nodes
          scheme: https
          tls_config:
            ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            insecure_skip_verify: true
          bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
          kubernetes_sd_configs:
            - role: node
          relabel_configs:
            - source_labels: [__address__]
              regex: '(.*)'
              replacement: '${1}:10250'
              target_label: __address__
            - source_labels: [__meta_kubernetes_node_name]
              target_label: node
            - action: labelmap
              regex: __meta_kubernetes_node_label_(.+)
          
resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "128Mi"
    cpu: "100m"
    
# Дополнительные настройки для сбора логов с файлов
extraScrapeConfigs: |
  - job_name: journal
    journal:
      path: /var/log/journal
      max_age: 12h
      labels:
        job: systemd-journal
    relabel_configs:
      - source_labels: ['__journal__systemd_unit']
        target_labels: 'unit'
      - source_labels: ['__journal__hostname']
        target_label: 'hostname'
          
